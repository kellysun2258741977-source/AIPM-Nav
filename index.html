<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kelly's AIPM Nav</title>
  <meta name="description" content="Kelly 的 AI 产品经理导航页：学习资源、实验平台、写作工具、行业洞察、Vibe Coding 与求职工作台的精选入口。" />
  <meta name="theme-color" content="#f0ede8" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231a1a1a'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='52' font-weight='700' fill='%23faf9f7' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="AIPM Nav" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Kelly's AIPM Nav" />
  <meta property="og:description" content="AI 产品经理的个人导航页 · 精选工具与资源入口。" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── 主题色变量（白天） ── */
    :root {
      --bg: #f0ede8;
      --panel: #faf9f7;
      --ink: #1a1a1a;
      --border: #e8e5e0;
      --border-soft: #ece9e4;
      --muted-1: #8a8a8a;
      --muted-2: #888;
      --muted-3: #949494;
      --faint: #8f8f8f;
      --link: #3f3f3f;
      --hover: #f2f0ec;
      --divider: #ddd;
      --shadow: rgba(0,0,0,0.06);
    }
    /* ── 主题色变量（黑夜） ── */
    :root[data-theme="dark"] {
      --bg: #131210;
      --panel: #1c1b17;
      --ink: #ede9e2;
      --border: #2e2c27;
      --border-soft: #272420;
      --muted-1: #a39e95;
      --muted-2: #9b968d;
      --muted-3: #a8a39a;
      --faint: #837d73;
      --link: #cdc8be;
      --hover: #24221e;
      --divider: #3a3731;
      --shadow: rgba(0,0,0,0.45);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      transition: background-color 0.35s ease;
    }

    .vg {
      background: var(--panel);
      width: 100%;
      max-width: 960px;
      border-radius: 20px;
      overflow: hidden;
      border: 0.5px solid var(--border);
      font-family: 'Jost', sans-serif;
      color: var(--ink);
      box-shadow: 0 4px 40px var(--shadow);
      transition: background-color 0.35s ease, border-color 0.35s ease;
    }

    /* ── Header ── */
    .vg-header {
      padding: 40px 52px 32px;
      border-bottom: 1.5px solid var(--ink);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      transition: border-color 0.35s ease;
    }
    .vg-eyebrow {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted-1);
      margin-bottom: 12px;
    }
    .vg-title {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 0.95;
      color: var(--ink);
      font-style: normal;
    }
    .vg-right { text-align: right; }
    .vg-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-bottom: 14px;
    }
    .vg-icon-btn {
      background: none;
      border: 0.5px solid var(--border);
      color: var(--muted-1);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      transition: all 0.2s ease;
    }
    .vg-icon-btn:hover { color: var(--ink); border-color: var(--ink); }
    .vg-icon-btn.active { background: var(--ink); color: var(--panel); border-color: var(--ink); }
    .vg-clock {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: 0.02em;
    }
    .vg-date {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted-2);
      margin-top: 6px;
    }

    /* ── Search ── */
    .vg-search-row {
      padding: 16px 52px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .vg-search-label {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted-3);
      white-space: nowrap;
    }
    .vg-divider-v { width: 0.5px; height: 14px; background: var(--divider); }
    .vg-search-row input {
      background: none;
      border: none;
      outline: none;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.03em;
      color: var(--ink);
      flex: 1;
      min-width: 0;
    }
    .vg-search-row input::placeholder { color: var(--faint); }

    .vg-engines { display: flex; gap: 2px; flex-shrink: 0; }
    .vg-engine {
      background: none;
      border: 0;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--faint);
      padding: 4px 7px;
      border-radius: 5px;
      transition: color 0.15s ease;
    }
    .vg-engine:hover { color: var(--muted-1); }
    .vg-engine.active { color: var(--ink); font-weight: 500; }

    /* ── 编辑工具条 ── */
    .vg-edit-bar {
      padding: 12px 52px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      background: var(--hover);
    }
    .vg-edit-bar[hidden] { display: none; }
    .vg-edit-bar button {
      background: var(--panel);
      border: 0.5px solid var(--border);
      color: var(--link);
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.15s ease;
    }
    .vg-edit-bar button:hover { color: var(--ink); border-color: var(--ink); }
    .vg-edit-hint {
      width: 100%;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--muted-2);
      margin-top: 2px;
    }

    /* ── Grid ── */
    .vg-feature {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 52px;
      border-bottom: 0.5px solid var(--border);
      text-decoration: none;
      color: var(--ink);
      background: linear-gradient(90deg, var(--hover), transparent 70%);
      transition: background 0.25s ease, border-color 0.35s ease;
    }
    .vg-feature:hover { background: var(--hover); }
    .vg-feature-l { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
    .vg-feature-tag {
      font-family: 'Jost', sans-serif; font-size: 9.5px; font-weight: 400;
      letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted-1);
    }
    .vg-feature-title {
      font-family: 'Playfair Display', serif; font-size: 21px; font-weight: 600;
      letter-spacing: -0.01em; line-height: 1.15;
    }
    .vg-feature-sub {
      font-family: 'Jost', sans-serif; font-size: 12.5px; font-weight: 300;
      color: var(--link); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .vg-feature-go {
      flex-shrink: 0; font-family: 'Jost', sans-serif; font-size: 13px;
      border: 0.5px solid var(--ink); border-radius: 999px; padding: 8px 18px;
      color: var(--ink); white-space: nowrap; transition: background 0.2s, color 0.2s;
    }
    .vg-feature:hover .vg-feature-go { background: var(--ink); color: var(--panel); }
    .vg-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
    }
    .vg-card {
      padding: 28px 32px;
      border-right: 0.5px solid var(--border);
      border-bottom: 0.5px solid var(--border);
      transition: background 0.2s, border-color 0.35s ease;
    }
    .vg-card:nth-child(3n) { border-right: none; }
    .vg-card:last-child { border-right: none; }
    .vg-card:hover { background: var(--hover); }
    .vg-card.dragover { outline: 1.5px dashed var(--ink); outline-offset: -5px; }
    .vg-card.vg-dragging { opacity: 0.4; }

    .vg-card-num {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--faint);
      margin-bottom: 12px;
    }
    .vg-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 4px;
      line-height: 1.1;
      letter-spacing: -0.01em;
      font-style: normal;
    }
    .vg-card-sub {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted-3);
      margin: 0 0 16px;
    }
    /* 编辑模式：分类标题栏 */
    .vg-cat-titlebar { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 16px; }
    .vg-cat-titles { flex: 1; min-width: 0; }
    .vg-cat-titles .vg-card-title { margin-bottom: 2px; }
    .vg-cat-titles .vg-card-sub { margin-bottom: 0; }
    .vg-cat-titlebar .vg-mini-btns { margin-top: 3px; }

    .vg-links { display: flex; flex-direction: column; }
    .vg-link {
      font-size: 14px;
      font-weight: 400;
      color: var(--link);
      padding: 7px 0;
      border-bottom: 0.5px solid var(--border-soft);
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
      gap: 8px;
    }
    .vg-link:last-child { border-bottom: none; }
    .vg-link:hover { color: var(--ink); }
    .vg-link-l { display: flex; align-items: center; gap: 9px; min-width: 0; }
    .vg-link-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .vg-link-mark {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      color: var(--faint);
      flex-shrink: 0;
    }

    /* 站点小图标 / 字母替身 */
    .vg-fav { position: relative; width: 16px; height: 16px; flex-shrink: 0; display: inline-block; }
    .vg-fav img { position: absolute; inset: 0; width: 16px; height: 16px; object-fit: contain; border-radius: 3px; }
    .vg-mono {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 11px; font-weight: 600;
      color: var(--muted-2); border: 0.5px solid var(--border); border-radius: 3px;
      background: var(--panel); line-height: 1;
    }

    /* ── 编辑模式下的链接行 ── */
    .vg-link-edit {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 7px 0;
      border-bottom: 0.5px solid var(--border-soft);
      font-size: 14px;
      font-weight: 400;
      color: var(--link);
    }
    .vg-link-edit:last-child { border-bottom: none; }
    .vg-link-edit.dragover { box-shadow: inset 0 2px 0 var(--ink); }
    .vg-link-edit.vg-dragging { opacity: 0.4; }
    .vg-link-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .vg-mini-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .vg-mini-btn {
      background: none;
      border: 0;
      cursor: pointer;
      color: var(--muted-3);
      font-size: 12px;
      padding: 2px;
      font-family: 'Jost', sans-serif;
      transition: color 0.15s ease;
      line-height: 1;
    }
    .vg-mini-btn:hover { color: var(--ink); }
    .vg-drag { cursor: grab; color: var(--faint); font-size: 12px; flex-shrink: 0; user-select: none; }
    .vg-drag:active { cursor: grabbing; }

    .vg-add-link, .vg-add-cat {
      margin-top: 12px;
      width: 100%;
      background: none;
      border: 0.5px dashed var(--border);
      color: var(--muted-2);
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 7px 10px;
      border-radius: 6px;
      transition: all 0.15s ease;
    }
    .vg-add-cat { margin-top: 0; }
    .vg-add-link:hover, .vg-add-cat:hover { color: var(--ink); border-color: var(--ink); }

    /* ── 内联表单 ── */
    .vg-form { display: flex; flex-direction: column; gap: 6px; padding: 8px 0; }
    .vg-form input {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      color: var(--ink);
      outline: none;
    }
    .vg-form input:focus { border-color: var(--ink); }
    .vg-form-btns { display: flex; gap: 6px; }
    .vg-form-btns button {
      flex: 1;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      padding: 7px;
      border-radius: 6px;
      border: 0.5px solid var(--border);
      transition: all 0.15s ease;
    }
    .vg-form-save { background: var(--ink); color: var(--panel); border-color: var(--ink); }
    .vg-form-cancel { background: none; color: var(--link); }
    .vg-form-cancel:hover { color: var(--ink); border-color: var(--ink); }

    /* ── Footer ── */
    .vg-footer {
      padding: 18px 52px;
      border-top: 1.5px solid var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.35s ease;
    }
    .vg-footer-l {
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--muted-2);
    }
    .vg-footer-r {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted-2);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .vg-dot { width: 5px; height: 5px; background: #34c759; border-radius: 50%; }

    .vg-noscript { padding: 28px 52px; color: var(--muted-1); font-size: 13px; }
    .vg-empty { font-size: 13px; color: var(--muted-1); line-height: 1.6; }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .vg-grid { grid-template-columns: 1fr 1fr; }
      .vg-card:nth-child(3n) { border-right: 0.5px solid var(--border); }
      .vg-card:nth-child(2n) { border-right: none; }
      .vg-card:last-child { border-right: none; }
      .vg-title { font-size: 44px; }
      .vg-header { padding: 28px 24px 24px; }
      .vg-search-row { padding: 14px 24px; }
      .vg-search-row input { font-size: 15px; }
      .vg-feature { padding: 16px 24px; }
      .vg-edit-bar { padding: 12px 24px; }
      .vg-footer { padding: 16px 24px; }
      /* 移动端正文放大、点击区加大，提升可读性 */
      .vg-card { padding: 26px 24px; }
      .vg-link, .vg-link-edit { font-size: 15px; padding-top: 9px; padding-bottom: 9px; }
      .vg-card-sub { font-size: 11px; }
      .vg-card-num { font-size: 11px; }
      .vg-fav, .vg-fav img { width: 18px; height: 18px; }
      .vg-mono { font-size: 12px; }
    }
    @media (max-width: 480px) {
      .vg-grid { grid-template-columns: 1fr; }
      .vg-card:nth-child(2n) { border-right: none; }
    }
  </style>
</head>
<body>
  <div class="vg">

    <div class="vg-header">
      <div>
        <div class="vg-eyebrow" id="eyebrow">AI Product Manager · Kelly</div>
        <div class="vg-title">AIPM<br>Nav</div>
      </div>
      <div class="vg-right">
        <div class="vg-actions">
          <button class="vg-icon-btn" id="themeBtn" title="切换主题" aria-label="切换白天/黑夜主题">☾</button>
          <button class="vg-icon-btn" id="editBtn" title="编辑（增删改 / 拖拽排序）" aria-label="编辑">✎</button>
        </div>
        <div class="vg-clock" id="clk">--:--:--</div>
        <div class="vg-date" id="dt">--</div>
      </div>
    </div>

    <div class="vg-search-row">
      <span class="vg-search-label">Search</span>
      <div class="vg-divider-v"></div>
      <input id="gs" type="search" aria-label="全局搜索（按 / 键聚焦）" placeholder="搜索工具、资源、文档…（按 / 聚焦）" />
      <div class="vg-engines" id="engines">
        <button class="vg-engine" data-engine="baidu">百度</button>
        <button class="vg-engine" data-engine="bing">Bing</button>
        <button class="vg-engine" data-engine="google">Google</button>
      </div>
    </div>

    <a class="vg-feature" href="prd-agent/index.html">
      <span class="vg-feature-l">
        <span class="vg-feature-tag">作品集 · Featured Agent</span>
        <span class="vg-feature-title">PRD Agent · 需求/PRD 助手</span>
        <span class="vg-feature-sub">输入一句想法，看 Agent 走完 澄清 → 用户故事 → PRD 的可见循环</span>
      </span>
      <span class="vg-feature-go">打开 ▸</span>
    </a>

    <div class="vg-edit-bar" id="editBar" hidden>
      <button data-act="reset">恢复默认</button>
      <button data-act="clearclicks">清空点击记录</button>
      <button data-act="export">导出备份</button>
      <button data-act="import">导入备份</button>
      <div class="vg-edit-hint">提示：拖动 ⠿ 可排序；手机上用 ▲▼ 调整顺序。✎ 改 · ✕ 删。</div>
    </div>

    <div class="vg-grid" id="grid"></div>
    <noscript><div class="vg-noscript">本页需要开启 JavaScript 才能显示导航内容。</div></noscript>

    <div class="vg-footer">
      <span class="vg-footer-l">Kelly · AIPM Nav · <span id="yr">2025</span></span>
      <span class="vg-footer-r"><span class="vg-dot"></span>All Systems Running</span>
    </div>

  </div>

  <script>

      { title: '构建原型', sub: 'Build', links: [

        { name: 'Bolt.new', url: 'https://bolt.new' },
        { name: 'v0', url: 'https://v0.app' }
      ]},
      { title: '文档 & 知识', sub: 'Docs', links: [
        { name: '飞书文档', url: 'https://www.feishu.cn' },
        { name: 'Notion', url: 'https://www.notion.so' },
        { name: '语雀', url: 'https://www.yuque.com' },
        { name: 'Obsidian', url: 'https://obsidian.md' }
      ]},
      { title: '项目 & 协作', sub: 'Deliver', links: [
        { name: '飞书项目', url: 'https://project.feishu.cn' },
        { name: 'TAPD', url: 'https://www.tapd.cn' },
        { name: 'Jira', url: 'https://www.atlassian.com/software/jira' },
        { name: 'Linear', url: 'https://linear.app' }
      ]},
      { title: '数据 & 增长', sub: 'Measure', links: [
        { name: 'GA4', url: 'https://analytics.google.com' },
        { name: '神策数据', url: 'https://www.sensorsdata.cn' },
        { name: 'Mixpanel', url: 'https://mixpanel.com' },
        { name: '七麦数据', url: 'https://www.qimai.cn' }
      ]},
      { title: '求职档案', sub: 'Career', links: [
        { name: 'LinkedIn', url: 'https://www.linkedin.com' },
        { name: 'BOSS 直聘', url: 'https://www.zhipin.com' },
        { name: '拉勾网', url: 'https://www.lagou.com' }
      ]}
    ];

    const ENGINES = {
      baidu:  { label: '百度',   url: 'https://www.baidu.com/s?wd=' },
      bing:   { label: 'Bing',   url: 'https://www.bing.com/search?q=' },
      google: { label: 'Google', url: 'https://www.google.com/search?q=' }
    };

    const KEYS = { links: 'aipm.links', theme: 'aipm.theme', engine: 'aipm.engine', clicks: 'aipm.clicks' };

    /* ====== 本地存储封装 ====== */
    const store = {
      get(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; } },
      set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} },
      del(key) { try { localStorage.removeItem(key); } catch (e) {} }
    };

    function loadData() {
      const d = store.get(KEYS.links, null);
      if (Array.isArray(d) && d.length) return d;
      return JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
    function saveData() { store.set(KEYS.links, data); }

    let data = loadData();
    let clicks = store.get(KEYS.clicks, {}) || {};
    let editMode = false;
    let formState = null;    // 链接表单 { cat, link:索引|null(新增) }
    let catFormState = null; // 分类表单 { cat:索引|null(新增) }
    let drag = null;         // 拖拽中 { type:'link'|'cat', cat, idx }
    let query = '';          // 站内搜索关键词（普通模式生效）

    const $ = id => document.getElementById(id);

    /* ====== 工具 ====== */
    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }
    function normUrl(u) {
      u = String(u).trim();
      if (!u) return '';
      if (!/^https?:\/\//i.test(u) && !/^mailto:/i.test(u)) u = 'https://' + u;
      return u;
    }
    function swap(arr, i, j) { const t = arr[i]; arr[i] = arr[j]; arr[j] = t; }
    function favHost(url) { try { return new URL(url).hostname; } catch (e) { return ''; } }
    function favHtml(url, name) {
      const host = favHost(url);
      const letter = esc(((name || '#').trim().charAt(0) || '#').toUpperCase());
      const src = host ? `https://www.google.com/s2/favicons?sz=64&domain=${encodeURIComponent(host)}` : '';
      return '<span class="vg-fav">' +
        `<span class="vg-mono">${letter}</span>` +
        (src ? `<img alt="" loading="lazy" referrerpolicy="no-referrer" src="${esc(src)}" onload="this.previousElementSibling.style.display='none'" onerror="this.style.display='none'">` : '') +
        '</span>';
    }

    /* ====== 渲染 ====== */
    function frequentLinks() {
      const all = [];
      data.forEach(cat => cat.links.forEach(l => {
        const n = clicks[l.url] || 0;
        if (n > 0) all.push({ name: l.name, url: l.url, n });
      }));
      all.sort((a, b) => b.n - a.n);
      return all.slice(0, 6);
    }

    function linkAnchor(l) {
      return `<a class="vg-link" href="${esc(l.url)}" data-url="${esc(l.url)}" target="_blank" rel="noopener noreferrer">` +
        `<span class="vg-link-l">${favHtml(l.url, l.name)}<span class="vg-link-text">${esc(l.name)}</span></span>` +
        '<span class="vg-link-mark">&rarr;</span></a>';
    }

    function linkForm(name, url) {
      return '<div class="vg-form">' +
        `<input class="vg-form-name" type="text" placeholder="名称，如 Notion" value="${esc(name)}" />` +
        `<input class="vg-form-url" type="text" placeholder="网址，如 notion.so" value="${esc(url)}" />` +
        '<div class="vg-form-btns">' +
        '<button class="vg-form-save" data-act="save">保存</button>' +
        '<button class="vg-form-cancel" data-act="cancel">取消</button>' +
        '</div></div>';
    }

    function catForm(title, sub) {
      return '<div class="vg-form">' +
        `<input class="vg-cat-name" type="text" placeholder="分类名，如 学习资源" value="${esc(title)}" />` +
        `<input class="vg-cat-sub" type="text" placeholder="英文副标题，如 Learning" value="${esc(sub)}" />` +
        '<div class="vg-form-btns">' +
        '<button class="vg-form-save" data-act="catsave">保存</button>' +
        '<button class="vg-form-cancel" data-act="catcancel">取消</button>' +
        '</div></div>';
    }

    function linkMatch(l, q) {
      return (l.name + ' ' + l.url + ' ' + favHost(l.url)).toLowerCase().includes(q);
    }

    function render() {
      const q = (!editMode && query) ? query.toLowerCase() : '';
      let html = '';
      let totalShown = 0;

      // 常用卡片：普通模式、无搜索、且有点击记录时显示
      if (!editMode && !q) {
        const freq = frequentLinks();
        if (freq.length) {
          html += '<div class="vg-card">' +
            '<div class="vg-card-num">★</div>' +
            '<div class="vg-card-title">常用</div>' +
            '<div class="vg-card-sub">Frequent</div>' +
            '<div class="vg-links">' + freq.map(linkAnchor).join('') + '</div></div>';
        }
      }

      // 分类卡片
      data.forEach((cat, ci) => {
        const num = String(ci + 1).padStart(2, '0');

        // 普通模式 + 搜索：过滤本分类链接，无命中则整卡跳过
        let items = cat.links.map((l, li) => ({ l, li }));
        if (q) {
          items = items.filter(({ l }) => linkMatch(l, q));
          if (!items.length) return;
        }
        totalShown += items.length;

        let card = `<div class="vg-card" data-cat="${ci}"><div class="vg-card-num">${num}</div>`;

        // 标题区：普通 / 编辑 / 重命名表单
        if (editMode && catFormState && catFormState.cat === ci) {
          card += catForm(cat.title, cat.sub);
        } else if (editMode) {
          card += '<div class="vg-cat-titlebar">' +
            `<span class="vg-drag vg-cat-drag" draggable="true" data-cat="${ci}" title="拖动排序分类">&#10303;</span>` +
            '<div class="vg-cat-titles">' +
            `<div class="vg-card-title">${esc(cat.title)}</div>` +
            `<div class="vg-card-sub">${esc(cat.sub || '')}</div>` +
            '</div>' +
            '<span class="vg-mini-btns">' +
            `<button class="vg-mini-btn" data-act="catup" data-cat="${ci}" title="上移">&#9650;</button>` +
            `<button class="vg-mini-btn" data-act="catdown" data-cat="${ci}" title="下移">&#9660;</button>` +
            `<button class="vg-mini-btn" data-act="catedit" data-cat="${ci}" title="重命名">&#9998;</button>` +
            `<button class="vg-mini-btn" data-act="catdel" data-cat="${ci}" title="删除分类">&times;</button>` +
            '</span></div>';
        } else {
          card += `<div class="vg-card-title">${esc(cat.title)}</div>` +
            `<div class="vg-card-sub">${esc(cat.sub || '')}</div>`;
        }

        card += '<div class="vg-links">';
        items.forEach(({ l, li }) => {
          if (editMode && formState && formState.cat === ci && formState.link === li) {
            card += linkForm(l.name, l.url);
          } else if (editMode) {
            card += `<div class="vg-link-edit" draggable="true" data-cat="${ci}" data-idx="${li}">` +
              '<span class="vg-drag" title="拖动排序">&#10303;</span>' +
              `<span class="vg-link-name">${esc(l.name)}</span>` +
              '<span class="vg-mini-btns">' +
              `<button class="vg-mini-btn" data-act="up" data-cat="${ci}" data-link="${li}" title="上移">&#9650;</button>` +
              `<button class="vg-mini-btn" data-act="down" data-cat="${ci}" data-link="${li}" title="下移">&#9660;</button>` +
              `<button class="vg-mini-btn" data-act="edit" data-cat="${ci}" data-link="${li}" title="修改">&#9998;</button>` +
              `<button class="vg-mini-btn" data-act="del" data-cat="${ci}" data-link="${li}" title="删除">&times;</button>` +
              '</span></div>';
          } else {
            card += linkAnchor(l);
          }
        });
        card += '</div>'; // .vg-links

        if (editMode) {
          if (formState && formState.cat === ci && formState.link === null) {
            card += linkForm('', '');
          } else {
            card += `<button class="vg-add-link" data-act="add" data-cat="${ci}">+ 添加链接</button>`;
          }
        }

        card += '</div>'; // .vg-card
        html += card;
      });

      // 站内搜索无命中提示
      if (q && totalShown === 0) {
        html = '<div class="vg-card" style="grid-column:1/-1">' +
          '<div class="vg-card-num">○</div>' +
          '<div class="vg-card-title">未找到</div>' +
          '<div class="vg-card-sub">No match</div>' +
          `<div class="vg-links"><span class="vg-empty">站内没有匹配「${esc(query)}」的链接 —— 按回车用 ${esc(ENGINES[engine].label)} 搜索。</span></div></div>`;
      }

      // 添加分类卡片（编辑模式）
      if (editMode) {
        if (catFormState && catFormState.cat === null) {
          html += '<div class="vg-card"><div class="vg-card-num">＋</div>' + catForm('', '') + '</div>';
        } else {
          html += '<div class="vg-card"><div class="vg-card-num">＋</div><button class="vg-add-cat" data-act="addcat">+ 添加分类</button></div>';
        }
      }

      $('grid').innerHTML = html;
    }

    function focusForm() { const el = document.querySelector('.vg-form .vg-form-name'); if (el) el.focus(); }
    function focusCatForm() { const el = document.querySelector('.vg-form .vg-cat-name'); if (el) el.focus(); }

    function saveForm(btn) {
      const form = btn.closest('.vg-form');
      const name = form.querySelector('.vg-form-name').value.trim();
      const url = normUrl(form.querySelector('.vg-form-url').value);
      if (!name || !url) { alert('请填写名称和网址'); return; }
      const { cat, link } = formState;
      if (link === null) data[cat].links.push({ name, url });
      else data[cat].links[link] = { name, url };
      saveData(); formState = null; render();
    }

    function saveCatForm(btn) {
      const form = btn.closest('.vg-form');
      const title = form.querySelector('.vg-cat-name').value.trim();
      const sub = form.querySelector('.vg-cat-sub').value.trim();
      if (!title) { alert('请填写分类名'); return; }
      const i = catFormState.cat;
      if (i === null) data.push({ title, sub, links: [] });
      else { data[i].title = title; data[i].sub = sub; }
      saveData(); catFormState = null; render();
    }

    function moveLink(srcCat, srcIdx, dstCat, dstIdx) {
      const item = data[srcCat].links[srcIdx];
      if (!item) return;
      data[srcCat].links.splice(srcIdx, 1);
      let di = dstIdx;
      if (srcCat === dstCat && srcIdx < dstIdx) di--;
      data[dstCat].links.splice(di, 0, item);
      saveData();
    }
    function moveCategoryTo(from, to) {
      if (from === to) return;
      const item = data[from];
      data.splice(from, 1);
      let t = to; if (from < to) t--;
      data.splice(t, 0, item);
      saveData();
    }

    /* ====== 网格点击（事件委托） ====== */
    $('grid').addEventListener('click', function (e) {
      const a = e.target.closest('a.vg-link');
      if (a && !editMode) {
        const url = a.dataset.url;
        if (url) { clicks[url] = (clicks[url] || 0) + 1; store.set(KEYS.clicks, clicks); setTimeout(render, 0); }
        return; // 照常在新标签页打开
      }
      const btn = e.target.closest('button');
      if (!btn) return;
      const act = btn.dataset.act;
      const ci = btn.dataset.cat !== undefined ? +btn.dataset.cat : null;
      const li = btn.dataset.link !== undefined ? +btn.dataset.link : null;
      switch (act) {
        case 'add': formState = { cat: ci, link: null }; catFormState = null; render(); focusForm(); break;
        case 'edit': formState = { cat: ci, link: li }; catFormState = null; render(); focusForm(); break;
        case 'del': if (confirm('删除链接「' + data[ci].links[li].name + '」吗？')) { data[ci].links.splice(li, 1); saveData(); render(); } break;
        case 'up': if (li > 0) { swap(data[ci].links, li, li - 1); saveData(); render(); } break;
        case 'down': if (li < data[ci].links.length - 1) { swap(data[ci].links, li, li + 1); saveData(); render(); } break;
        case 'save': saveForm(btn); break;
        case 'cancel': formState = null; render(); break;
        case 'catedit': catFormState = { cat: ci }; formState = null; render(); focusCatForm(); break;
        case 'catdel': if (confirm('确定删除「' + data[ci].title + '」整个分类及其下所有链接吗？')) { data.splice(ci, 1); saveData(); render(); } break;
        case 'catup': if (ci > 0) { swap(data, ci, ci - 1); saveData(); render(); } break;
        case 'catdown': if (ci < data.length - 1) { swap(data, ci, ci + 1); saveData(); render(); } break;
        case 'addcat': catFormState = { cat: null }; formState = null; render(); focusCatForm(); break;
        case 'catsave': saveCatForm(btn); break;
        case 'catcancel': catFormState = null; render(); break;
      }
    });

    /* 表单回车保存 / Esc 取消 */
    $('grid').addEventListener('keydown', function (e) {
      const form = e.target.closest && e.target.closest('.vg-form');
      if (!form) return;
      if (e.key === 'Enter') { e.preventDefault(); const b = form.querySelector('.vg-form-save'); if (b) b.click(); }
      else if (e.key === 'Escape') { formState = null; catFormState = null; render(); }
    });

    /* ====== 拖拽排序（事件委托） ====== */
    function clearDragover() { document.querySelectorAll('.dragover').forEach(x => x.classList.remove('dragover')); }
    const grid = $('grid');
    grid.addEventListener('dragstart', function (e) {
      const h = e.target.closest('.vg-cat-drag');
      const row = e.target.closest('.vg-link-edit');
      if (h) { drag = { type: 'cat', cat: +h.dataset.cat }; const card = h.closest('.vg-card'); if (card) card.classList.add('vg-dragging'); }
      else if (row) { drag = { type: 'link', cat: +row.dataset.cat, idx: +row.dataset.idx }; row.classList.add('vg-dragging'); }
      else { return; }
      if (e.dataTransfer) { e.dataTransfer.effectAllowed = 'move'; try { e.dataTransfer.setData('text/plain', 'aipm'); } catch (_) {} }
    });
    grid.addEventListener('dragover', function (e) {
      if (!drag) return;
      e.preventDefault();
      if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      clearDragover();
      if (drag.type === 'link') {
        const row = e.target.closest('.vg-link-edit');
        const card = e.target.closest('.vg-card[data-cat]');
        if (row) row.classList.add('dragover');
        else if (card) card.classList.add('dragover');
      } else {
        const card = e.target.closest('.vg-card[data-cat]');
        if (card) card.classList.add('dragover');
      }
    });
    grid.addEventListener('drop', function (e) {
      if (!drag) return;
      e.preventDefault();
      if (drag.type === 'link') {
        const row = e.target.closest('.vg-link-edit');
        const card = e.target.closest('.vg-card[data-cat]');
        if (row) { moveLink(drag.cat, drag.idx, +row.dataset.cat, +row.dataset.idx); }
        else if (card) { const dc = +card.dataset.cat; moveLink(drag.cat, drag.idx, dc, data[dc].links.length); }
      } else {
        const card = e.target.closest('.vg-card[data-cat]');
        if (card) moveCategoryTo(drag.cat, +card.dataset.cat);
      }
      drag = null; clearDragover(); render();
    });
    grid.addEventListener('dragend', function () {
      drag = null; clearDragover();
      document.querySelectorAll('.vg-dragging').forEach(x => x.classList.remove('vg-dragging'));
    });

    /* ====== 编辑模式开关 ====== */
    $('editBtn').addEventListener('click', function () {
      editMode = !editMode;
      formState = null; catFormState = null;
      query = ''; $('gs').value = '';
      this.classList.toggle('active', editMode);
      $('editBar').hidden = !editMode;
      render();
    });

    /* ====== 编辑工具条 ====== */
    $('editBar').addEventListener('click', function (e) {
      const btn = e.target.closest('button');
      if (!btn) return;
      const act = btn.dataset.act;
      if (act === 'reset') {
        if (confirm('确定恢复成默认链接吗？你自己添加和修改的链接会被清除。')) {
          store.del(KEYS.links); data = loadData(); formState = null; catFormState = null; render();
        }
      } else if (act === 'clearclicks') {
        if (confirm('确定清空点击记录吗？“常用”里的内容会被清除。')) {
          clicks = {}; store.del(KEYS.clicks); render();
        }
      } else if (act === 'export') { exportBackup(); }
      else if (act === 'import') { importBackup(); }
    });

    function exportBackup() {
      const payload = JSON.stringify({ links: data, clicks: clicks }, null, 2);
      if (navigator.clipboard) { navigator.clipboard.writeText(payload).catch(() => {}); }
      try {
        const blob = new Blob([payload], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'aipm-nav-backup.json';
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) {}
      alert('备份已下载，同时复制到了剪贴板。换电脑/浏览器时，用“导入备份”粘贴回来即可。');
    }
    // 校验并清洗导入数据，过滤畸形项，避免坏数据写入后白屏
    function sanitizeData(arr) {
      if (!Array.isArray(arr)) return null;
      const clean = arr
        .filter(c => c && typeof c.title === 'string' && Array.isArray(c.links))
        .map(c => ({
          title: c.title,
          sub: typeof c.sub === 'string' ? c.sub : '',
          links: c.links
            .filter(l => l && typeof l.name === 'string' && typeof l.url === 'string')
            .map(l => ({ name: l.name, url: l.url }))
        }));
      return clean.length ? clean : null;
    }
    function importBackup() {
      const text = prompt('把之前导出的备份内容整段粘贴到这里：');
      if (!text) return;
      try {
        const obj = JSON.parse(text);
        const clean = sanitizeData(obj.links);
        if (!clean) { alert('导入失败：备份里没有有效的分类/链接数据。'); return; }
        data = clean; saveData();
        if (obj.clicks && typeof obj.clicks === 'object') { clicks = obj.clicks; store.set(KEYS.clicks, clicks); }
        formState = null; catFormState = null; render();
        alert('导入成功！');
      } catch (e) { alert('导入失败：内容格式不正确，请确认粘贴的是完整的备份。'); }
    }

    /* ====== 主题 ====== */
    const root = document.documentElement;
    function applyTheme(t) {
      root.dataset.theme = t;
      $('themeBtn').textContent = t === 'dark' ? '☀' : '☾';
      $('themeBtn').title = t === 'dark' ? '切换到白天' : '切换到黑夜';
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', t === 'dark' ? '#131210' : '#f0ede8');
    }
    function initTheme() {
      let t = store.get(KEYS.theme, null);
      if (t !== 'dark' && t !== 'light') {
        t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      }
      applyTheme(t);
    }
    $('themeBtn').addEventListener('click', function () {
      const t = root.dataset.theme === 'dark' ? 'light' : 'dark';
      applyTheme(t); store.set(KEYS.theme, t);
    });
    initTheme();

    /* ====== 搜索引擎 ====== */
    let engine = store.get(KEYS.engine, 'baidu');
    if (!ENGINES[engine]) engine = 'baidu';
    function markEngine() {
      document.querySelectorAll('.vg-engine').forEach(b => b.classList.toggle('active', b.dataset.engine === engine));
    }
    $('engines').addEventListener('click', function (e) {
      const b = e.target.closest('.vg-engine');
      if (!b) return;
      engine = b.dataset.engine; store.set(KEYS.engine, engine); markEngine();
    });
    markEngine();

    function matchLinks(q) {
      q = q.toLowerCase();
      const out = [];
      data.forEach(cat => cat.links.forEach(l => { if (linkMatch(l, q)) out.push(l); }));
      return out;
    }
    // 输入即过滤站内链接
    $('gs').addEventListener('input', function () {
      query = this.value.trim();
      if (!editMode) render();
    });
    // 回车：先跳站内命中的第一条，没有再用所选引擎搜外网
    $('gs').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        const q = this.value.trim();
        if (!q) return;
        const m = matchLinks(q);
        if (m.length) {
          clicks[m[0].url] = (clicks[m[0].url] || 0) + 1; store.set(KEYS.clicks, clicks);
          window.open(m[0].url, '_blank');
        } else {
          window.open(ENGINES[engine].url + encodeURIComponent(q), '_blank');
        }
      } else if (e.key === 'Escape') {
        this.value = ''; query = ''; if (!editMode) render(); this.blur();
      }
    });

    /* ====== 键盘快捷键： / 聚焦搜索 ====== */
    document.addEventListener('keydown', function (e) {
      const t = (e.target.tagName || '').toLowerCase();
      const typing = t === 'input' || t === 'textarea' || e.target.isContentEditable;
      if (e.key === '/' && !typing) { e.preventDefault(); $('gs').focus(); }
    });

    /* ====== 时钟 · 日期 · 问候 · 年份 ====== */
    function greeting() {
      const h = new Date().getHours();
      if (h < 5) return '夜深了';
      if (h < 11) return '早上好';
      if (h < 13) return '中午好';
      if (h < 18) return '下午好';
      if (h < 23) return '晚上好';
      return '夜深了';
    }
    function tick() {
      const n = new Date();
      $('clk').textContent = n.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      $('dt').textContent = n.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' });
      $('eyebrow').textContent = greeting() + '，Kelly · AI Product Manager';
    }
    tick();
    setInterval(tick, 1000);
    $('yr').textContent = new Date().getFullYear();

    /* ====== 首次渲染 ====== */
    render();

    /* ====== PWA：注册 Service Worker（仅在 http/https 下） ====== */
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
</html>
