<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIPM 个人导航页</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <!-- 背景渐变层 -->
    <div class="background-gradient"></div>
    
    <!-- 主容器 -->
    <div class="container">
        <!-- 视觉中心 - Hero Area -->
        <header class="hero-area">
            <div class="date-display" id="date-display">04月05日 星期日</div>
            <div class="clock-display" id="clock-display">15:08:30</div>
        </header>

        <!-- 药丸形搜索框 -->
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="global-search" placeholder="搜索：Google / 资料 / 代码 / 笔记……" class="global-search-input">
        </div>

        <!-- 中间内容区域 -->
        <main class="main-content">
            <!-- 首页：今日概览 -->
            <section id="home-section" class="content-section active">
                <div class="overview-card">
                    <h2 class="section-title">今日概览</h2>
                    <p class="overview-text">今日专注：AIPM 面试准备</p>
                    <div class="overview-actions">
                        <button class="action-btn" onclick="activateTab('learn')">进入学习模式</button>
                        <button class="action-btn" onclick="activateTab('work')">打开工作台</button>
                    </div>
                </div>
            </section>

            <!-- 学习模式 -->
            <section id="learn-section" class="content-section">
                <h2 class="section-title">学习 · Learn</h2>
                <p class="section-subtitle">系统化学习 AI & AIPM 能力</p>
                <div class="grid-container">
                    <!-- 学习模式卡片将在JS中动态生成 -->
                </div>
            </section>

            <!-- 实验模式 -->
            <section id="lab-section" class="content-section">
                <h2 class="section-title">实验 · Lab</h2>
                <p class="section-subtitle">动手做 Demo，探索 AI 边界</p>
                <div class="grid-container">
                    <!-- 实验模式卡片将在JS中动态生成 -->
                </div>
            </section>

            <!-- 写作模式 -->
            <section id="write-section" class="content-section">
                <h2 class="section-title">写作 · Write</h2>
                <p class="section-subtitle">输出 PRD、策略、内容与面试回答</p>
                <div class="grid-container">
                    <!-- 写作模式卡片将在JS中动态生成 -->
                </div>
            </section>

            <!-- 洞察模式 -->
            <section id="insight-section" class="content-section">
                <h2 class="section-title">洞察 · Insight</h2>
                <p class="section-subtitle">看行业、看竞品、看趋势</p>
                <div class="grid-container">
                    <!-- 洞察模式卡片将在JS中动态生成 -->
                </div>
            </section>

            <!-- 工作台模式 -->
            <section id="work-section" class="content-section">
                <h2 class="section-title">工作台 · Work</h2>
                <p class="section-subtitle">处理邮件、会议与项目任务</p>
                <div class="grid-container">
                    <!-- 工作台模式卡片将在JS中动态生成 -->
                </div>
            </section>
        </main>
    </div>

    <!-- 底部 Dock 导航栏 -->
    <nav class="dock-nav">
        <div class="dock-item active" data-tab="home">
            <span class="dock-icon">🏠</span>
            <div class="indicator"></div>
        </div>
        <div class="dock-item" data-tab="learn">
            <span class="dock-icon">📖</span>
            <div class="indicator"></div>
        </div>
        <div class="dock-item" data-tab="lab">
            <span class="dock-icon">🧪</span>
            <div class="indicator"></div>
        </div>
        <div class="dock-item" data-tab="write">
            <span class="dock-icon">✏️</span>
            <div class="indicator"></div>
        </div>
        <div class="dock-item" data-tab="insight">
            <span class="dock-icon">👁</span>
            <div class="indicator"></div>
        </div>
        <div class="dock-item" data-tab="work">
            <span class="dock-icon">💼</span>
            <div class="indicator"></div>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
